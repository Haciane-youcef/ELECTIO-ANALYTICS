services:

  # ─────────────────────────────────────────
  # DREMIO – Coordinateur
  # ─────────────────────────────────────────
  ea-dremio-coordinator:
    image: dremio/dremio-oss:latest
    container_name: ea-dremio-coordinator
    ports:
      - "9047:9047"
      - "31010:31010"
      - "45678:45678"
    environment:
      - DREMIO_JAVA_EXTRA_OPTS=-Xmx4g -XX:MaxDirectMemorySize=4g
    volumes:
      - ea-dremio-coordinator-data:/opt/dremio/data
      - ./ea-pdfs-shared:/opt/dremio/pdfs
      - ./dremio-coordinator.conf:/opt/dremio/conf/dremio.conf:ro
    networks:
      - mspr-net
    command: ["start-coordinator"]

  # ─────────────────────────────────────────
  # DREMIO – Workers
  # ─────────────────────────────────────────
  ea-dremio-worker-1:
    image: dremio/dremio-oss:latest
    container_name: ea-dremio-worker-1
    depends_on:
      - ea-dremio-coordinator
    environment:
      - DREMIO_JAVA_EXTRA_OPTS=-Xmx4g -XX:MaxDirectMemorySize=4g
    volumes:
      - ea-dremio-worker-1-data:/opt/dremio/data
      - ./ea-pdfs-shared:/opt/dremio/pdfs
      - ./dremio-worker.conf:/opt/dremio/conf/dremio.conf:ro
    networks:
      - mspr-net

  ea-dremio-worker-2:
    image: dremio/dremio-oss:latest
    container_name: ea-dremio-worker-2
    depends_on:
      - ea-dremio-coordinator
    environment:
      - DREMIO_JAVA_EXTRA_OPTS=-Xmx4g -XX:MaxDirectMemorySize=4g
    volumes:
      - ea-dremio-worker-2-data:/opt/dremio/data
      - ./ea-pdfs-shared:/opt/dremio/pdfs
      - ./dremio-worker.conf:/opt/dremio/conf/dremio.conf:ro
    networks:
      - mspr-net

  # ─────────────────────────────────────────
  # MINIO – Data Lake Storage
  # ─────────────────────────────────────────
  ea-minio-storage:
    image: minio/minio
    container_name: ea-minio-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: eaadmin
      MINIO_ROOT_PASSWORD: eaadmin123
    command: server /data --console-address ":9001"
    volumes:
      - ea-minio-data:/data
    networks:
      - mspr-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────
  # NESSIE – Catalogue Iceberg
  # ─────────────────────────────────────────
  ea-nessie-catalog:
    image: projectnessie/nessie
    container_name: ea-nessie-catalog
    ports:
      - "19120:19120"
    environment:
      NESSIE_VERSION_STORE_TYPE: ROCKSDB
      NESSIE_ROCKSDB_PERSIST: "true"
      NESSIE_ROCKSDB_PATH: "/var/lib/nessie"
    volumes:
      - ea-nessie-data:/var/lib/nessie
    networks:
      - mspr-net

  # ─────────────────────────────────────────
  # PREFECT – Base de données PostgreSQL
  # ─────────────────────────────────────────
  database_prefect:
    image: postgres:16-alpine
    container_name: ea-prefect-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prefect
    expose:
      - 5432
    volumes:
      - ea-prefect-db-data:/var/lib/postgresql/data
    networks:
      - mspr-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # PREFECT – Serveur UI / API
  # ─────────────────────────────────────────
  server_prefect:
    image: prefecthq/prefect:3-python3.12
    container_name: ea-prefect-server
    restart: always
    entrypoint: ["/opt/prefect/entrypoint.sh", "prefect", "server", "start"]
    environment:
      - PREFECT_UI_URL=http://localhost:4200/api
      - PREFECT_API_URL=http://localhost:4200/api
      - PREFECT_SERVER_API_HOST=0.0.0.0
      - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://postgres:postgres@database_prefect:5432/prefect
    ports:
      - "4200:4200"
    depends_on:
      database_prefect:
        condition: service_healthy
    networks:
      - mspr-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────
  # PREFECT – Worker (pool "default")
  # ─────────────────────────────────────────
  worker_prefect:
    image: prefecthq/prefect:3-python3.12
    container_name: ea-prefect-worker
    restart: always
    entrypoint:
      - /opt/prefect/entrypoint.sh
      - bash
      - -c
      - |
        pip install -r /root/flows/requirements.txt && \
        prefect worker start -p default
    environment:
      - PREFECT_API_URL=http://server_prefect:4200/api
      # Credentials MinIO accessibles dans les flows
      - MINIO_ENDPOINT=ea-minio-storage:9000
      - MINIO_ACCESS_KEY=eaadmin
      - MINIO_SECRET_KEY=eaadmin123
      - MINIO_BUCKET=datalake
    volumes:
      - ./flows:/root/flows
    depends_on:
      server_prefect:
        condition: service_healthy
    networks:
      - mspr-net

  # ─────────────────────────────────────────
  # PREFECT – CLI (déploiement manuel)
  # ─────────────────────────────────────────
  cli_prefect:
    image: prefecthq/prefect:3-python3.12
    container_name: ea-prefect-cli
    entrypoint: "bash"
    working_dir: "/root/flows"
    volumes:
      - ./flows:/root/flows
    environment:
      - PREFECT_API_URL=http://server_prefect:4200/api
      - MINIO_ENDPOINT=ea-minio-storage:9000
      - MINIO_ACCESS_KEY=eaadmin
      - MINIO_SECRET_KEY=eaadmin123
      - MINIO_BUCKET=datalake
    command: >
      -c "pip install --upgrade pip &&
          pip install -r /root/flows/requirements.txt &&
          bash"
    networks:
      - mspr-net

# ─────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────
volumes:
  ea-dremio-coordinator-data:
  ea-dremio-worker-1-data:
  ea-dremio-worker-2-data:
  ea-minio-data:
  ea-nessie-data:
  ea-prefect-db-data:

# ─────────────────────────────────────────
# RÉSEAU UNIQUE (tous les services)
# ─────────────────────────────────────────
networks:
  mspr-net: